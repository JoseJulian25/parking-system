spring.application.name=parking-system
server.port=${PORT:8080}
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}
app.timezone=${APP_TIMEZONE:America/Santo_Domingo}
spring.jackson.time-zone=${app.timezone}

app.cors.allowed-origin=${APP_CORS_ALLOWED_ORIGIN:http://localhost:3000}

# JWT Config
jwt.secret=${JWT_SECRET:ParkingSystem2026SecretKeyForJWTHS256AlgorithmMinimum32Chars!}
jwt.expiration=${JWT_EXPIRATION:86400000}

# Mail SMTP Config
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
