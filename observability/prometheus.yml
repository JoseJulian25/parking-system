global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: parking-system-prod
    scheme: https
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - YOUR_RENDER_SERVICE.onrender.com:443
        labels:
          environment: production
          service: parking-system-backend
